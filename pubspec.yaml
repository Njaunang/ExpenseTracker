name: lookup
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.3

dependencies:
  crypto: ^3.0.7
  email_validator: ^3.0.0
  fl_chart: ^1.2.0
  flutter:
    sdk: flutter
  flutter_iconpicker: ^4.0.3
  flutter_lints: ^6.0.0
  flutter_local_notifications: ^21.0.0
  flutter_localizations:
    sdk: flutter
  flutter_svg: ^2.2.4
  fluttertoast: ^9.0.0
  google_fonts: ^8.0.2
  image_picker: ^1.2.1
  intl: ^0.20.2
  path: ^1.9.1
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  sqflite: ^2.4.2
  uuid: ^4.5.3

dev_dependencies:
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/icon.png"

  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true
  
  
  assets:
    - assets/icons/
    - assets/images/
    - assets/translations/

